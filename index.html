<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle Certification — Catálogo de Exámenes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,700;0,900;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="exam-engine.css">
  <script>try{if(localStorage.getItem('oci-theme')==='light')document.documentElement.setAttribute('data-theme','light')}catch(e){}</script>
  <style>
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }
    .exam-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 28px;
      position: relative;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .2s, transform .15s;
    }
    .exam-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      background: var(--accent);
      transition: background .2s;
    }
    .exam-card:hover {
      border-color: var(--border-bright);
      transform: translateY(-2px);
    }
    .exam-card:hover::before {
      background: var(--gold);
    }
    .card-code {
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }
    .card-name {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -.01em;
    }
    .card-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .card-meta-item {
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .card-meta-item span {
      color: var(--gold);
      font-weight: 700;
    }
    .card-cta {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-cta::after {
      content: "→";
      color: var(--accent);
      transition: transform .15s;
    }
    .exam-card:hover .card-cta::after {
      transform: translateX(4px);
    }
    .page-hero {
      text-align: center;
      padding: 40px 20px 20px;
    }
    .page-hero .eyebrow {
      color: var(--accent);
      letter-spacing: .25em;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .page-hero h2 {
      font-family: 'Fraunces', serif;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.03em;
      margin-bottom: 12px;
    }
    .page-hero h2 em {
      font-style: italic;
      color: var(--gold);
    }
    .page-hero .sub {
      color: var(--text-dim);
      font-size: 14px;
      max-width: 480px;
      margin: 0 auto;
    }
    .section-label {
      font-size: 10px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .section-title {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.01em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: .1em;
    }
  </style>
</head>
<body class="grain">
  <div class="container">
    <header>
      <div class="brand">
        <div class="brand-mark">O</div>
        <div class="brand-text">
          <div class="meta">Oracle Certification</div>
          <h1>Exam Practice</h1>
        </div>
      </div>
      <button id="theme-btn" class="theme-btn" title="Cambiar tema"></button>
    </header>

    <div class="page-hero">
      <div class="eyebrow">Preparación certificación</div>
      <h2>Catálogo de<br><em>Exámenes</em></h2>
      <p class="sub">Selecciona un examen para comenzar a practicar. Todos los exámenes incluyen modo práctica y modo examen.</p>
    </div>

    <div>
      <div class="section-label">Disponibles</div>
      <div class="section-title" id="catalog-count"></div>
      <div class="catalog-grid" id="catalog-grid"></div>
    </div>
  </div>

  <script>
    const CATALOG = [
      {
        code: '1Z0-1085-25',
        name: 'OCI Foundations Associate',
        file: 'examen_oci_1Z0-1085-25.html',
        questions: 50,
        minutes: 90,
        passPercent: 65,
        lang: 'ES'
      },
      {
        code: '1Z0-1122-25',
        name: 'OCI AI Foundations Associate',
        file: 'examen_oci_1Z0-1122-25.html',
        questions: 44,
        minutes: 85,
        passPercent: 65,
        lang: 'ES'
      },
      // Añade más exámenes aquí
    ];

    const grid = document.getElementById('catalog-grid');
    const countEl = document.getElementById('catalog-count');

    countEl.textContent = `${CATALOG.length} examen${CATALOG.length !== 1 ? 'es' : ''} disponible${CATALOG.length !== 1 ? 's' : ''}`;

    if (CATALOG.length === 0) {
      grid.innerHTML = '<div class="empty-state">No hay exámenes disponibles todavía.</div>';
    } else {
      grid.innerHTML = CATALOG.map(exam => `
        <a href="${exam.file}" class="exam-card">
          <div class="card-code">${exam.code}</div>
          <div class="card-name">${exam.name}</div>
          <div class="card-meta">
            <div class="card-meta-item"><span>${exam.questions}</span> preguntas</div>
            <div class="card-meta-item"><span>${exam.passPercent}%</span> aprobado</div>
            <div class="card-meta-item"><span>${exam.minutes}</span> min</div>
            <div class="card-meta-item"><span>${exam.lang}</span></div>
          </div>
          <div class="card-cta">Comenzar práctica</div>
        </a>
      `).join('');
    }

    // Theme toggle
    const themeBtn = document.getElementById('theme-btn');
    const savedTheme = localStorage.getItem('oci-theme') || 'dark';
    themeBtn.textContent = savedTheme === 'light' ? '☀️' : '🌙';
    themeBtn.addEventListener('click', () => {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('oci-theme', 'dark');
        themeBtn.textContent = '🌙';
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('oci-theme', 'light');
        themeBtn.textContent = '☀️';
      }
    });
  </script>
</body>
</html>
